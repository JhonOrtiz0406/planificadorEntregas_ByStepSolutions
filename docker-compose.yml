services:
  # ============================================================
  # Backend - Spring Boot
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: deployment/Dockerfile
    container_name: delivery-planner-backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      APP_NAME: ${APP_NAME:-DeliveryPlanner}
      APP_DISPLAY_NAME: ${APP_DISPLAY_NAME:-Planificador de Entregas}
      APP_URL: ${APP_URL}
      SERVER_PORT: ${SERVER_PORT:-8084}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_TEST_MODE: ${WHATSAPP_TEST_MODE:-false}
      WHATSAPP_LANGUAGE: ${WHATSAPP_LANGUAGE:-es}
    expose:
      - "8084"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-http.rule=Host(`api.delivery-planner.bystepsolutions.tech`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.backend-https.rule=Host(`api.delivery-planner.bystepsolutions.tech`)"
      - "traefik.http.routers.backend-https.entrypoints=websecure"
      - "traefik.http.routers.backend-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend-service.loadbalancer.server.port=8084"
    networks:
      - delivery-network
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 384M
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8084/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Frontend - Angular 19 + Nginx
  # ============================================================
  frontend:
    build:
      context: ./frontend/planificador-entregas
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-}
        APP_NAME: ${APP_NAME:-DeliveryPlanner}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        FIREBASE_API_KEY: ${FIREBASE_API_KEY}
        FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
        FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
        FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
        FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID}
        FIREBASE_APP_ID: ${FIREBASE_APP_ID}
        FIREBASE_VAPID_KEY: ${FIREBASE_VAPID_KEY}
    container_name: delivery-planner-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL:-backend:8084}
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-http.rule=Host(`delivery-planner.bystepsolutions.tech`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.frontend-https.rule=Host(`delivery-planner.bystepsolutions.tech`)"
      - "traefik.http.routers.frontend-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend-service.loadbalancer.server.port=80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - delivery-network
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  delivery-network:
    driver: bridge
    name: delivery-network
  dokploy-network:
    external: true
    name: dokploy-network