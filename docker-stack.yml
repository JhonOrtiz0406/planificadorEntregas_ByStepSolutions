services:
  backend:
    image: ghcr.io/jhonortiz0406/delivery-planner-backend:latest
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      APP_NAME: ${APP_NAME:-DeliveryPlanner}
      APP_DISPLAY_NAME: ${APP_DISPLAY_NAME:-Planificador de Entregas}
      APP_URL: ${APP_URL}
      SERVER_PORT: ${SERVER_PORT:-8084}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_TEST_MODE: ${WHATSAPP_TEST_MODE:-false}
      WHATSAPP_LANGUAGE: ${WHATSAPP_LANGUAGE:-es}
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 384M
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
        monitor: 120s
      rollback_config:
        order: stop-first
        failure_action: continue
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=dokploy-network"
        - "traefik.http.routers.delivery-backend-web.rule=Host(`api.delivery-planner.bystepsolutions.tech`)"
        - "traefik.http.routers.delivery-backend-web.entrypoints=web"
        - "traefik.http.routers.delivery-backend-web.middlewares=redirect-to-https@file"
        - "traefik.http.routers.delivery-backend-web.service=delivery-backend-svc"
        - "traefik.http.routers.delivery-backend-websecure.rule=Host(`api.delivery-planner.bystepsolutions.tech`)"
        - "traefik.http.routers.delivery-backend-websecure.entrypoints=websecure"
        - "traefik.http.routers.delivery-backend-websecure.tls.certresolver=letsencrypt"
        - "traefik.http.routers.delivery-backend-websecure.service=delivery-backend-svc"
        - "traefik.http.services.delivery-backend-svc.loadbalancer.server.port=8084"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/jhonortiz0406/delivery-planner-frontend:latest
    environment:
      BACKEND_URL: ${BACKEND_URL:-backend:8084}
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
      update_config:
        order: start-first
        failure_action: rollback
        delay: 5s
        monitor: 30s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=dokploy-network"
        - "traefik.http.routers.delivery-frontend-web.rule=Host(`app.delivery-planner.bystepsolutions.tech`)"
        - "traefik.http.routers.delivery-frontend-web.entrypoints=web"
        - "traefik.http.routers.delivery-frontend-web.middlewares=redirect-to-https@file"
        - "traefik.http.routers.delivery-frontend-web.service=delivery-frontend-svc"
        - "traefik.http.routers.delivery-frontend-websecure.rule=Host(`app.delivery-planner.bystepsolutions.tech`)"
        - "traefik.http.routers.delivery-frontend-websecure.entrypoints=websecure"
        - "traefik.http.routers.delivery-frontend-websecure.tls.certresolver=letsencrypt"
        - "traefik.http.routers.delivery-frontend-websecure.service=delivery-frontend-svc"
        - "traefik.http.services.delivery-frontend-svc.loadbalancer.server.port=80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dokploy-network:
    external: true
    name: dokploy-network
