server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    # Angular 19 SSR: index.csr.html is the CSR fallback (always generated).
    # index.html is only generated if SSR pre-rendering succeeds at build time.
    index index.csr.html index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https:;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets (1 year, immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api requests to backend
    # BACKEND_URL is substituted at container start-up via envsubst.
    # Same-stack (docker-compose): backend:8084
    # Separate deployment:         <backend-container-name>:<port>  or internal DNS
    location /api {
        proxy_pass http://${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_hide_header Access-Control-Allow-Origin;
    }

    # Angular routing – serve CSR index for all unmatched routes (SPA)
    location / {
        try_files $uri $uri/ /index.csr.html;
    }

    # Block access to hidden and sensitive files
    location ~ /\. { deny all; }
    location ~ /(Dockerfile|\.env|docker-compose) { deny all; }
}
