server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /

spring:
  application:
    name: ${APP_NAME:DeliveryPlanner}
  devtools:
    add-properties: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    repair-on-migrate: true
    placeholders:
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  name: ${APP_DISPLAY_NAME}
  url: ${APP_URL}
  company:
    name: ByStep Solutions S.A.S.
    website: https://www.bystepsolutions.tech/

  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS}
    google-client-id: ${GOOGLE_CLIENT_ID}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS}

  firebase:
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON}
    storage-bucket: ${FIREBASE_STORAGE_BUCKET}

  whatsapp:
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    webhook-verify-token: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
    test-mode: ${WHATSAPP_TEST_MODE:false}
    language: ${WHATSAPP_LANGUAGE:es}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    tech.bystep.planificador: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
