name: Build & Deploy

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/jhonortiz0406/delivery-planner-backend
  FRONTEND_IMAGE: ghcr.io/jhonortiz0406/delivery-planner-frontend
  STACK_NAME: delivery-planner
  APP_DIR: /etc/dokploy/compose/planificador-entregas-full-aplicacion-tp0u8a/code

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/deployment/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/planificador-entregas
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            API_URL=
            APP_NAME=DeliveryPlanner
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
            FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
            FIREBASE_VAPID_KEY=${{ secrets.FIREBASE_VAPID_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-stack.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-stack.yml
          target: ${{ env.APP_DIR }}

      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            APP_DIR="/etc/dokploy/compose/planificador-entregas-full-aplicacion-tp0u8a/code"

            # Autenticar en GHCR para pull de imágenes
            echo "$GHCR_TOKEN" | docker login ghcr.io -u jhonortiz0406 --password-stdin

            # Pre-pull para que el rollout no espere el pull
            docker pull ghcr.io/jhonortiz0406/delivery-planner-backend:latest
            docker pull ghcr.io/jhonortiz0406/delivery-planner-frontend:latest

            # Cargar env vars que administra Dokploy
            set -a && source "$APP_DIR/.env" && set +a

            # Rolling deploy — start-first, rollback automático si falla healthcheck
            docker stack deploy \
              --with-registry-auth \
              --compose-file "$APP_DIR/docker-stack.yml" \
              --detach=false \
              delivery-planner
