name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
      - 'feature/**'

jobs:
  # ────────────────────────────────────────────────
  # Backend — build + test (all branches)
  # ────────────────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and test
        working-directory: backend
        run: ./gradlew build --no-daemon -x :app-service:bootJar

      - name: Coverage report
        working-directory: backend
        run: ./gradlew jacocoMergedReport --no-daemon
        continue-on-error: true

  # ────────────────────────────────────────────────
  # Frontend — build (all branches)
  # ────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/planificador-entregas/package-lock.json

      - name: Install dependencies
        working-directory: frontend/planificador-entregas
        run: npm ci

      - name: Build (dev)
        working-directory: frontend/planificador-entregas
        run: npm run build

  # ────────────────────────────────────────────────
  # Notify Dokploy — ONLY from main (trunk)
  # Actual deploy is handled by Dokploy watching main.
  # This step pings Dokploy webhook to trigger deploy.
  # Set DOKPLOY_WEBHOOK_URL in repo secrets.
  # ────────────────────────────────────────────────
  notify-deploy:
    name: Trigger Dokploy Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Dokploy webhook
        run: |
          curl -f -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"branch":"main","ref":"${{ github.sha }}"}'
        continue-on-error: true
